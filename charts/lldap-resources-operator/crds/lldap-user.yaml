apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: lldapusers.lldap-resources-operator.lukidoescode.com
spec:
  group: lldap-resources-operator.lukidoescode.com
  names:
    kind: LldapUser
    listKind: LldapUserList
    plural: lldapusers
    singular: lldapuser
    shortNames:
      - llu
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: An lldap user managed by the operator
          type: object
          properties:
            spec:
              type: object
              required:
                - username
                - email
                - passwordSecretRef
              properties:
                username:
                  type: string
                email:
                  type: string
                displayName:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                groups:
                  type: array
                  items:
                    type: string
                passwordSecretRef:
                  type: object
                  required:
                    - name
                    - key
                  properties:
                    name:
                      type: string
                    key:
                      type: string
            status:
              type: object
              properties:
                uuid:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Username
          type: string
          jsonPath: .spec.username
        - name: Email
          type: string
          jsonPath: .spec.email
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
