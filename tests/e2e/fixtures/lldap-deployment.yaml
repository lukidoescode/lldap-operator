apiVersion: apps/v1
kind: Deployment
metadata:
  name: lldap
  labels:
    app: lldap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lldap
  template:
    metadata:
      labels:
        app: lldap
    spec:
      containers:
        - name: lldap
          image: lldap/lldap:latest
          ports:
            - name: http
              containerPort: 17170
            - name: ldap
              containerPort: 3890
          env:
            - name: LLDAP_JWT_SECRET
              value: "test-jwt-secret-not-for-production"
            - name: LLDAP_LDAP_USER_PASS
              valueFrom:
                secretKeyRef:
                  name: lldap-admin-credentials
                  key: password
            - name: LLDAP_LDAP_BASE_DN
              value: "dc=example,dc=com"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: lldap
spec:
  selector:
    app: lldap
  ports:
    - name: http
      port: 17170
      targetPort: http
    - name: ldap
      port: 3890
      targetPort: ldap
