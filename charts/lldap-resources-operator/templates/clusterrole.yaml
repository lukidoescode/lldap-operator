apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "lldap-resources-operator.fullname" . }}
  labels:
    {{- include "lldap-resources-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - lldap-resources-operator.lukidoescode.com
    resources:
      - lldapusers
      - lldapgroups
    verbs:
      - get
      - list
      - watch
      - patch
      - update
  - apiGroups:
      - lldap-resources-operator.lukidoescode.com
    resources:
      - lldapusers/status
      - lldapgroups/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
