---
name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Only run dry-run, do not publish
        type: boolean
        default: false
      pre_release:
        description: Pre-release tag (e.g. alpha, beta)
        type: string
        required: false
      graduate:
        description: >-
          Space-separated crate names to graduate to 1.0.0
          (e.g. "crate-a crate-b")
        type: string
        required: false
        default: ""
      keep_changesets:
        description: Keep changeset files after release
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Dry run release
        run: |-
          FLAGS="--dry-run"
          if [ -n "${{ inputs.pre_release }}" ]; then
            FLAGS="$FLAGS --prerelease ${{ inputs.pre_release }}"
          fi
          for item in ${{ inputs.graduate }}; do
            FLAGS="$FLAGS --graduate $item"
          done
          if [ "${{ inputs.keep_changesets }}" = "true" ]; then
            FLAGS="$FLAGS --keep-changesets"
          fi

          GIT_USER_NAME="$(git config user.name)"
          GIT_USER_EMAIL="$(git config user.email)"

          docker run --rm \
            -v "$(pwd):/workspace" -w /workspace \
            -e GIT_AUTHOR_NAME="$GIT_USER_NAME" \
            -e GIT_AUTHOR_EMAIL="$GIT_USER_EMAIL" \
            -e GIT_COMMITTER_NAME="$GIT_USER_NAME" \
            -e GIT_COMMITTER_EMAIL="$GIT_USER_EMAIL" \
            "ghcr.io/lukidoescode/cargo-changeset:latest" \
            release $FLAGS

      - name: Execute release
        if: ${{ inputs.dry_run == false }}
        run: |-
          FLAGS=""
          if [ -n "${{ inputs.pre_release }}" ]; then
            FLAGS="$FLAGS --prerelease ${{ inputs.pre_release }}"
          fi
          for item in ${{ inputs.graduate }}; do
            FLAGS="$FLAGS --graduate $item"
          done
          if [ "${{ inputs.keep_changesets }}" = "true" ]; then
            FLAGS="$FLAGS --keep-changesets"
          fi

          GIT_USER_NAME="$(git config user.name)"
          GIT_USER_EMAIL="$(git config user.email)"

          docker run --rm \
            -v "$(pwd):/workspace" -w /workspace \
            -e GIT_AUTHOR_NAME="$GIT_USER_NAME" \
            -e GIT_AUTHOR_EMAIL="$GIT_USER_EMAIL" \
            -e GIT_COMMITTER_NAME="$GIT_USER_NAME" \
            -e GIT_COMMITTER_EMAIL="$GIT_USER_EMAIL" \
            "ghcr.io/lukidoescode/cargo-changeset:latest" \
            release $FLAGS

      - name: Push release commit and tags
        if: ${{ inputs.dry_run == false }}
        run: git push --follow-tags

  docker:
    name: Build and Push Docker Image
    needs: release
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(cargo metadata --format-version=1 --no-deps \
            | jq -r '.packages[] | select(.name=="lldap-operator") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

  helm:
    name: Publish Helm Chart
    needs: release
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - uses: azure/setup-helm@v4

      - uses: helm/chart-releaser-action@v1
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: charts
